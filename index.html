<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backstop | Community Accountability Hub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        :root {
            /* Modern SaaS Palette (Stripe/Tailwind Inspired) */
            --bg-main: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #4f46e5; /* Indigo-600 */
            --accent-hover: #4338ca;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --item-hover: #f1f5f9;
            
            --sidebar-width: 320px;
            --header-height: 64px;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Responsive Layout Grid */
        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* Mobile Header - Visible only on mobile */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
        }

        .hamburger {
            cursor: pointer;
            width: 24px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 110;
        }
        .hamburger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: white;
            border-radius: 2px;
            transition: all 0.3s;
        }

        @media (max-width: 1024px) {
            .mobile-header { display: flex; }
            #content-viewport { padding-top: var(--header-height); }
        }

        /* Sidebar Modern UI */
        #sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-overlay {
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.5); 
            z-index: 40;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 1024px) {
            #sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); height: 100vh; background: white; box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
            #sidebar.open { transform: translateX(0); }
            #sidebar.open ~ .sidebar-overlay { display: block; }
        }
        /* Sidebar Elements */
        .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .brand-header h1 { font-size: 1.125rem; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: -0.02em; }
        .brand-header p { font-size: 0.75rem; color: var(--accent); font-weight: 600; margin: 4px 0 0 0; text-transform: uppercase; }

        .search-container { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .search-input {
            width: 100%; padding: 10px 14px; background: var(--bg-main);
            border: 1px solid var(--border); border-radius: 8px; font-size: 0.875rem;
            color: var(--text-main); outline: none; transition: all 0.2s ease;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .sidebar-nav { flex-grow: 1; overflow-y: auto; padding: 24px 0; }
        .nav-group { margin-bottom: 32px; }
        .nav-group-title {
            padding: 0 24px 8px 24px; font-size: 0.7rem; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
        }
        .nav-item {
            padding: 10px 24px; font-size: 0.875rem; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .nav-item:hover { color: var(--text-main); background: var(--item-hover); }
        .nav-item.active { 
            color: var(--accent); font-weight: 600; background: #eef2ff;
            border-left-color: var(--accent);
        }

        /* Main Component Overhaul */
        main {
            flex-grow: 1; overflow-y: auto; background-color: var(--bg-main);
            display: flex; flex-direction: column; align-items: center;
        }

        .blueprint-page {
            background: #ffffff; color: var(--text-main);
            width: 100%; max-width: 820px; margin: 60px 24px;
            padding: 80px 100px; border-radius: 12px;
            box-shadow: var(--shadow-md); position: relative;
        }

        .blueprint-page h1 { font-size: 2.5rem; font-weight: 800; margin-top: 0; letter-spacing: -0.04em; color: var(--text-main); }
        .blueprint-page h2 { font-size: 1.5rem; font-weight: 700; margin-top: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--text-main); }
        .blueprint-page h3 { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); margin-top: 2rem; }
        .blueprint-page p { font-size: 1.1rem; line-height: 1.7; color: #374151; margin-bottom: 1.5rem; }

        .callout {
            background: #f0f9ff; border-left: 4px solid var(--accent);
            padding: 20px 24px; border-radius: 8px; margin: 32px 0;
            font-size: 0.95rem; color: #0c4a6e;
        }
        .callout strong { color: var(--accent); text-transform: uppercase; font-size: 0.75rem; display: block; margin-bottom: 4px; }

        .diagram-box {
            background: #f8fafc; border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; margin: 32px 0;
            display: flex; justify-content: center;
        }

        /* Dashboard Refinement */
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
            width: 100%; max-width: 1000px; margin-top: 64px;
        }
        .db-card {
            background: #fff; border: 1px solid var(--border);
            border-radius: 12px; padding: 32px; transition: all 0.2s;
            box-shadow: var(--shadow-sm); cursor: pointer;
        }
        .db-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); border-color: var(--accent); }
        .db-card h3 { font-size: 1.125rem; font-weight: 700; margin: 0 0 12px 0; color: var(--text-main); }
        .db-card p { font-size: 0.9375rem; color: var(--text-muted); line-height: 1.6; margin: 0; }
        .db-icon { 
            width: 48px; height: 48px; background: #eef2ff;
            border-radius: 10px; color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .blueprint-page { padding: 40px 24px; margin: 24px 16px; }
            .blueprint-page h1 { font-size: 2rem; }
            .dashboard-grid { grid-template-columns: 1fr; padding: 0 24px; }
        }
        @media print {
            #sidebar, .mobile-header, .search-container, .sidebar-footer { display: none !important; }
            main { padding: 0 !important; background: none !important; display: block !important; overflow: visible !important; }
            .blueprint-page {
                width: 100% !important; max-width: none !important; margin: 0 !important;
                box-shadow: none !important; padding: 0.5in !important;
                border: none !important; page-break-after: always;
                box-sizing: border-box !important;
            }
        }
    </style>
</head>
<body data-role="home">
    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="brand-header" style="margin: 0;">
            <h1 style="font-size: 1.125rem; background: none; -webkit-text-fill-color: initial; color: #fff;">THE BACKSTOP</h1>
        </div>
        <div class="hamburger" onclick="toggleMobileSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="app-shell">
        <div class="sidebar-overlay" onclick="closeMobileSidebar()"></div>
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="brand-header" onclick="goHome()" style="cursor: pointer;">
                    <h1>The Backstop</h1>
                    <p>Community Standards v11.0</p>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="sidebarSearch" class="search-input" placeholder="Search rules, guides..." oninput="handleSearch(this.value)">
            </div>
            
            <div class="sidebar-nav" id="sidebarNav">
                <!-- Nav groups and items will be rendered here dynamically -->
            </div>

            <div class="sidebar-footer" style="padding: 16px 24px; border-top: 1px solid var(--border); text-align: center; font-size: 0.7rem; color: var(--text-muted);">
                Protecting the Community Culture
            </div>
        </aside>

        <main id="content-viewport">
            <div class="blueprint-page">
                <div id="handbook-preview">Initializing Accountability Hub...</div>
            </div>
        </main>
    </div>

    <script src="coaching_data.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontFamily: 'Inter' });

        let activeResource = '';
        let collapsedGroups = new Set();
        let config = { league_name: 'Diamond Command', league_abbreviation: 'LL', umpire_model: 'volunteer' };
        let searchQuery = '';

        function init() {
            // Configure marked to open links in new tab with dual-signature support
            const renderer = new marked.Renderer();
            renderer.link = (hrefOrToken, title, text) => {
                // Handle modern Token object signature
                if (typeof hrefOrToken === 'object' && hrefOrToken !== null && hrefOrToken.href) {
                    return `<a href="${hrefOrToken.href}" title="${hrefOrToken.title || ''}" target="_blank" rel="noopener">${hrefOrToken.text}</a>`;
                }
                // Handle traditional positional arguments
                return `<a href="${hrefOrToken}" title="${title || ''}" target="_blank" rel="noopener">${text}</a>`;
            };
            marked.use({ renderer });

            loadFromLocalStorage();
            renderSidebar();
            updateHandbook();
        }

        // --- Core Rendering ---
        function renderSidebar() {
            const container = document.getElementById('sidebarNav');
            container.innerHTML = '';

            const filteredKeys = Object.keys(coachingData).filter(key => {
                const data = coachingData[key];
                const matchesSearch = !searchQuery || 
                    data.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    data.content.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesSearch;
            });

            // Topic-Based Grouping
            const grouped = {};
            filteredKeys.forEach(key => {
                const data = coachingData[key];
                const group = data.group || 'General';
                if (!grouped[group]) grouped[group] = [];
                grouped[group].push({ key, ...data });
            });

            Object.keys(grouped).sort().forEach(group => {
                const items = grouped[group];
                const isCollapsed = collapsedGroups.has(group) && !searchQuery;

                const groupEl = document.createElement('div');
                groupEl.className = 'nav-group';
                
                const titleEl = document.createElement('div');
                titleEl.className = 'nav-group-title';
                titleEl.innerText = group;
                titleEl.onclick = () => toggleGroup(group);
                groupEl.appendChild(titleEl);

                if (!isCollapsed) {
                    items.forEach(item => {
                        const itemEl = document.createElement('div');
                        itemEl.className = `nav-item ${activeResource === item.key ? 'active' : ''}`;
                        const cleanTitle = item.title.replace(/^[A-Z][0-9]-[A-Z0-9.-]+\s*/, '');
                        itemEl.innerHTML = `<span>${cleanTitle}</span>`;
                        itemEl.onclick = () => selectResource(item.key);
                        groupEl.appendChild(itemEl);
                    });
                }
                container.appendChild(groupEl);
            });
        }

        function updateHandbook() {
            const leagueName = "The Accountability Hub";
            let html = '';

            if (activeResource && coachingData[activeResource]) {
                const res = coachingData[activeResource];
                const content = res.content
                    .replace(/> \[!IMPORTANT\]\n> (.*)/g, '<div class="callout"><strong>The Standard</strong>$1</div>')
                    .replace(/\[League Name\]/g, leagueName);

                html = `<h1>${res.title}</h1>${marked.parse(content)}`;
            } else {
                html = `
                    <div style="text-align: center; margin-bottom: 48px;">
                        <h1 style="font-size: 3.5rem; margin-bottom: 16px; color: var(--text-main);">The Backstop</h1>
                        <p style="font-size: 1.25rem; color: var(--text-muted);">The anchor of our community baseball culture.</p>
                    </div>

                    <div style="background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 12px; padding: 40px; margin-bottom: 32px; box-shadow: var(--shadow-sm);">
                        <h2 style="margin-top: 0; color: var(--text-main); font-size: 1.75rem; border-bottom: none;">Why "The Backstop"?</h2>
                        <p style="color: var(--text-main); line-height: 1.8; font-size: 1.05rem;">
                            A backstop exists to protect the fans, catch the wild pitches, and provide a solid wall for the crew to work against. In our league, this site serves as that same foundational shield. 
                        </p>
                        <p style="color: var(--text-main); line-height: 1.8; font-size: 1.05rem; margin-top: 16px;">
                            We provide parents, coaches, and umpires with the verifiable rules, technical mechanics, and behavioral standards needed to protect our kids and our volunteer culture from bad actors and Tier 3 pressure.
                        </p>
                    </div>

                    <div class="mission-section" style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 40px; margin-bottom: 48px; box-shadow: var(--shadow-sm);">
                        <h2 style="margin-top: 0; color: var(--text-main); font-size: 1.75rem; border-bottom: none;">Mission Compatibility & The Three-Tier Model</h2>
                        <p style="color: var(--text-muted); margin-bottom: 32px;">Understanding where your player fits in the youth baseball ecosystem.</p>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;">
                            <!-- Tier 1: Community -->
                            <div style="border-right: 1px solid var(--border); padding-right: 20px;">
                                <h4 style="color: var(--accent); text-transform: uppercase; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 20px;">1. Community Charter</h4>
                                <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: var(--text-main); line-height: 1.6;">
                                    <li style="margin-bottom: 10px;"><strong>🔹 Neighborhood Focus:</strong> Neighbors coaching neighbors.</li>
                                    <li style="margin-bottom: 10px;"><strong>🔹 Development:</strong> Success is measured by the child's return.</li>
                                    <li><strong>🔹 Volunteer:</strong> Managed by goodwill, not profit.</li>
                                </ul>
                            </div>
                            <!-- Tier 2: Hybrid (Community Select) -->
                            <div style="border-right: 1px solid var(--border); padding-right: 20px; padding-left: 10px;">
                                <h4 style="color: #166534; text-transform: uppercase; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 20px;">2. Community "Select" Program</h4>
                                <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: var(--text-main); line-height: 1.6;">
                                    <li style="margin-bottom: 10px;"><strong>🔸 Unaffiliated:</strong> A separate organization from the Little League Charter.</li>
                                    <li style="margin-bottom: 10px;"><strong>🔸 Bridge Model:</strong> Advanced development for LL-registered kids only.</li>
                                    <li><strong>🔸 Independence:</strong> Must maintain a separate board and bank account to protect LL integrity.</li>
                                </ul>
                            </div>
                            <!-- Tier 3: Professional Club -->
                            <div style="padding-left: 10px;">
                                <h4 style="color: var(--text-muted); text-transform: uppercase; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 20px;">3. Professional Club</h4>
                                <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.85rem; color: var(--text-main); line-height: 1.6;">
                                    <li style="margin-bottom: 10px;"><strong>🔸 Performance:</strong> Focus on elite-level competition.</li>
                                    <li style="margin-bottom: 10px;"><strong>🔸 General Access:</strong> No Little League registration required.</li>
                                    <li><strong>🔸 High Intensity:</strong> 10+ tournaments and professional services.</li>
                                </ul>
                            </div>
                        </div>
                        <div style="background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-top: 32px; color: var(--text-main); font-size: 0.9rem; line-height: 1.6;">
                            <strong>A Note on "Select" Independence:</strong> The Community Select program is a **separate, unaffiliated organization.** To ensure a fair evaluation for the Summer tournament path, performance metrics are interpreted through the lens of peer-level age standards. This help us maintain a "Community of Culture" where players are evaluated based on their progress against their own chronological cohorts.
                        </div>
                    </div>

                    <div class="dashboard-grid">
                        <div class="db-card" onclick="selectResource('UIC-JD')">
                            <div class="db-icon">🛡️</div>
                            <h3>UIC Operations</h3>
                            <p>Leadership, scheduling, and charter advocacy for Coordinator roles.</p>
                        </div>
                        <div class="db-card" onclick="selectResource('UMP-CLINIC')">
                            <div class="db-icon">🎭</div>
                            <h3>Umpire Field Guide</h3>
                            <p>The "Cheat Sheets": Mechanics, signals, and positional field coverage.</p>
                        </div>
                        <div class="db-card" onclick="selectResource('COACH-PHIL')">
                            <div class="db-icon">⚾</div>
                            <h3>Youth Coach Operations</h3>
                            <p>Philosophy, drill templates, and manager checklists.</p>
                        </div>
                        <div class="db-card" onclick="selectResource('PARENT-ENFORCE')">
                            <div class="db-icon">👨‍👩‍👧‍👦</div>
                            <h3>Parent Empowerment</h3>
                            <p>Rules, behavioral standards, and holding the league accountable.</p>
                        </div>
                    </div>
                `;
            }

            document.getElementById('handbook-preview').innerHTML = html;
            if (activeResource && coachingData[activeResource]?.diagram) mermaid.init(undefined, document.querySelectorAll('.mermaid'));
        }

        function goHome() {
            activeResource = '';
            updateHandbook();
            renderSidebar();
            saveToLocalStorage();
            closeMobileSidebar();
        }

        function handleSearch(val) {
            searchQuery = val;
            renderSidebar();
        }

        function selectResource(key) {
            activeResource = key;
            renderSidebar();
            updateHandbook();
            saveToLocalStorage();
            closeMobileSidebar();
        }

        function toggleGroup(group) {
            if (collapsedGroups.has(group)) collapsedGroups.delete(group);
            else collapsedGroups.add(group);
            renderSidebar();
            saveToLocalStorage();
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
        }

        function closeMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('uic_v9_active', activeResource);
            localStorage.setItem('uic_config', JSON.stringify(config));
            localStorage.setItem('uic_collapsed', JSON.stringify([...collapsedGroups]));
        }

        function loadFromLocalStorage() {
            activeResource = localStorage.getItem('uic_v9_active') || '';
            const savedConfig = localStorage.getItem('uic_config');
            if (savedConfig) config = JSON.parse(savedConfig);
            
            const savedCollapsed = localStorage.getItem('uic_collapsed');
            if (savedCollapsed) {
                collapsedGroups = new Set(JSON.parse(savedCollapsed));
            } else {
                // Default: Collapse all groups for a cleaner look
                const allGroups = [...new Set(Object.values(coachingData).map(d => d.group || 'General'))];
                collapsedGroups = new Set(allGroups);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
