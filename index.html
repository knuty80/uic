<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title-tag">The Backstop | Community Baseball Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #1e40af; /* Diamond Blue */
            --accent-soft: #eff6ff;
            --bg-main: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --sidebar-width: 340px;
            --glass: rgba(255, 255, 255, 0.8);
        }

        /* --- GLOBAL --- */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); 
            height: 100vh; display: flex; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* --- SIDEBAR (GLASSMORPHISM) --- */
        #sidebar { 
            width: var(--sidebar-width); min-width: var(--sidebar-width); 
            background: var(--bg-sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; height: 100vh; position: relative;
            z-index: 20; box-shadow: 4px 0 24px -10px rgba(0,0,0,0.05);
        }
        .sidebar-header { 
            padding: 28px 24px; border-bottom: 1px solid var(--border); 
            cursor: pointer; position: relative;
        }
        .sidebar-header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
        .sidebar-header p { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
        
        .settings-cog {
            position: absolute; top: 28px; right: 24px; font-size: 1.1rem; color: var(--text-muted);
            cursor: pointer; transition: transform 0.3s; opacity: 0.5;
        }
        .settings-cog:hover { transform: rotate(45deg); opacity: 1; color: var(--accent); }

        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 16px 0; }

        /* --- NAVIGATION TREE --- */
        .tree-book { margin-bottom: 12px; }
        .tree-book-header { 
            padding: 12px 24px; font-size: 0.75rem; font-weight: 800; 
            color: var(--text-main); text-transform: uppercase; letter-spacing: 0.05em;
            display: flex; align-items: center; gap: 12px; background: #fafafa;
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }
        .tree-section-header {
            padding: 8px 24px 8px 44px; font-size: 0.8rem; font-weight: 600;
            color: var(--text-muted); display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .tree-section-header:hover { color: var(--accent); background: var(--accent-soft); }
        .tree-section-header .chevron { font-size: 0.6rem; transition: transform 0.2s; opacity: 0.4; }
        
        .tree-section.collapsed .tree-items { display: none; }
        .tree-section.collapsed .chevron { transform: rotate(-90deg); }

        .tree-items { padding: 4px 0; border-left: 1px solid var(--border); margin-left: 48px; }
        .tree-item {
            padding: 6px 16px; font-size: 0.85rem; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; border-radius: 4px; margin: 2px 0;
        }
        .tree-item:hover { color: var(--accent); background: var(--accent-soft); }
        .tree-item.active { color: var(--accent); font-weight: 700; background: var(--accent-soft); position: relative; }
        .tree-item.active::before { content: ''; position: absolute; left:-1px; top:0; bottom:0; width: 4px; background: var(--accent); border-radius: 0 4px 4px 0; }

        /* --- CONTENT AREA --- */
        main { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; background: #ffffff; position: relative; }
        #content-viewport { width: 100%; max-width: 900px; padding: 80px 48px; min-height: 100%; }

        /* --- DRILLS & PLANS (BIP-READY) --- */
        .content-card { 
            background: #fff; padding: 60px 80px; border-radius: 1px; 
            border: 1px solid #eee; box-shadow: 0 4px 20px -10px rgba(0,0,0,0.05); 
            position: relative; line-height: 1.7;
        }
        .content-card h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 2rem; letter-spacing: -0.04em; color: var(--text-main); border-bottom: 4px solid var(--accent); padding-bottom: 12px; }
        .content-card h3 { font-size: 1.15rem; font-weight: 800; margin-top: 2.5rem; margin-bottom: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
        .content-card p { font-size: 1.1rem; color: #334155; margin-bottom: 1.5rem; }
        .content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 1.5rem; }
        .content-card li { font-size: 1.1rem; color: #334155; margin-bottom: 0.75rem; padding-left: 8px; }
        .content-card strong { color: var(--text-main); font-weight: 700; }
        .content-card hr { border: none; border-top: 1px solid #f1f5f9; margin: 3rem 0; }

        /* Actions Bar */
        .actions-bar { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .action-btn { 
            background: #fff; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; 
            font-size: 0.75rem; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        /* --- DASHBOARD --- */
        .dashboard { width: 100%; text-align: center; }
        .dash-header { margin-bottom: 64px; }
        .dash-header span { text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.75rem; font-weight: 800; color: var(--accent); display: block; margin-bottom: 16px; }
        .dash-header h1 { font-size: 3rem; font-weight: 900; letter-spacing: -0.05em; color: var(--text-main); }
        
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .dash-card { 
            background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 48px 32px; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; position: relative; overflow: hidden;
        }
        .dash-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 25px -5px rgba(30, 64, 175, 0.1); }
        .dash-card .icon { font-size: 2.5rem; margin-bottom: 20px; display: block; filter: grayscale(1); transition: filter 0.3s; }
        .dash-card:hover .icon { filter: grayscale(0); }
        .dash-card h3 { font-size: 1.125rem; font-weight: 800; margin-bottom: 12px; color: var(--text-main); }
        .dash-card p { font-size: 0.875rem; color: var(--text-muted); line-height: 1.5; }
        
        /* Modal */
        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); 
            display: none; align-items: center; justify-content: center; z-index: 100; 
        }
        .modal { background: #fff; padding: 40px; border-radius: 16px; width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal h2 { margin-bottom: 16px; font-weight: 800; }
        .modal input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 24px; font-family: inherit; font-size: 1rem; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-primary { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: #f1f5f9; color: var(--text-muted); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* Print Overrides */
        @media print {
            #sidebar, .actions-bar, .dashboard-grid { display: none !important; }
            main { overflow: visible; background: #fff; }
            #content-viewport { padding: 0; max-width: none; width: 100%; }
            .content-card { box-shadow: none; border: none; padding: 0; }
            .content-card h1 { font-size: 2rem; border-bottom: 2px solid #000; }
            .content-card h3 { color: #000; break-after: avoid; }
            p, li { font-size: 12pt !important; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <!-- Identity Settings Modal -->
    <div id="modal-overlay">
        <div class="modal">
            <h2>League Customization</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">Personalize the site title for your local league (Stored locally in your browser).</p>
            <input type="text" id="league-name-input" placeholder="e.g. Cedar Mill Little League">
            <div class="modal-btns">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveIdentity()">Save Identity</button>
            </div>
        </div>
    </div>

    <nav id="sidebar">
        <div class="sidebar-header" onclick="goHome()">
            <h1 id="site-title">The Backstop</h1>
            <p id="site-subtitle">Command Center</p>
            <div class="settings-cog" onclick="openModal(event)">⚙️</div>
        </div>
        <div class="sidebar-scroll" id="treeNav"></div>
    </nav>
    <main>
        <div id="content-viewport">
            <div id="dynamic-content"></div>
        </div>
    </main>

    <script src="coaching_data.js"></script>
    <script>
        let activeKey = '';
        let expandedSections = new Set();
        let leagueName = localStorage.getItem('ll_league_name') || 'The Backstop';

        function init() {
            applyIdentity();
            renderTree();
            updateContent();
        }

        function applyIdentity() {
            document.getElementById('site-title').innerText = leagueName;
            document.getElementById('site-title-tag').innerText = `${leagueName} | Command Center`;
        }

        function openModal(e) { e.stopPropagation(); document.getElementById('modal-overlay').style.display = 'flex'; document.getElementById('league-name-input').value = leagueName === 'The Backstop' ? '' : leagueName; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function saveIdentity() { 
            const val = document.getElementById('league-name-input').value.trim();
            leagueName = val || 'The Backstop';
            localStorage.setItem('ll_league_name', leagueName);
            applyIdentity();
            closeModal();
        }

        function renderTree() {
            const container = document.getElementById('treeNav');
            container.innerHTML = '';
            const books = ["Book I", "Book II/III", "Umpire Office"];
            const dataArr = Object.entries(coachingData).map(([k, v]) => ({ key: k, ...v }));

            books.forEach(bookName => {
                const bookItems = dataArr.filter(i => i.book === bookName);
                if (bookItems.length === 0) return;
                const bookDiv = document.createElement('div');
                bookDiv.className = 'tree-book';
                bookDiv.innerHTML = `<div class="tree-book-header"><span>${bookName === 'Book I' ? '📘' : bookName === 'Book II/III' ? '📗' : '🛡️'}</span> ${bookName.toUpperCase()}</div>`;
                
                const sections = [...new Set(bookItems.map(i => i.section))].sort();
                sections.forEach(secName => {
                    const secItems = bookItems.filter(i => i.section === secName);
                    const isExpanded = expandedSections.has(secName);
                    const secDiv = document.createElement('div');
                    secDiv.className = `tree-section ${isExpanded ? '' : 'collapsed'}`;
                    const secHead = document.createElement('div');
                    secHead.className = 'tree-section-header';
                    secHead.innerHTML = `<span>${secName}</span><span class="chevron">▼</span>`;
                    secHead.onclick = () => toggleSection(secName);
                    secDiv.appendChild(secHead);
                    const itemsBox = document.createElement('div');
                    itemsBox.className = 'tree-items';
                    secItems.forEach(item => {
                        const itemEl = document.createElement('div');
                        itemEl.className = `tree-item ${activeKey === item.key ? 'active' : ''}`;
                        itemEl.innerText = item.title;
                        itemEl.onclick = (e) => { e.stopPropagation(); selectItem(item.key, secName); };
                        itemsBox.appendChild(itemEl);
                    });
                    secDiv.appendChild(itemsBox);
                    bookDiv.appendChild(secDiv);
                });
                container.appendChild(bookDiv);
            });
        }

        function toggleSection(secName) {
            if (expandedSections.has(secName)) expandedSections.delete(secName); else expandedSections.add(secName);
            renderTree();
        }

        function selectItem(key, secName) { activeKey = key; expandedSections.add(secName); renderTree(); updateContent(); }

        function updateContent() {
            const container = document.getElementById('dynamic-content');
            if (activeKey) {
                const res = coachingData[activeKey];
                container.innerHTML = `
                    <div class="content-card">
                        <div class="actions-bar">
                            <button class="action-btn" onclick="window.print()">🖨️ Print</button>
                            <button class="action-btn" onclick="copyToClipboard()">📋 Copy</button>
                        </div>
                        <p style="text-transform:uppercase; color:var(--accent); font-weight:800; font-size:0.75rem; margin-bottom:8px; opacity: 0.6;">${res.book} / ${res.section}</p>
                        <h1>${res.title}</h1>
                        <div id="md-body">${marked.parse(res.content)}</div>
                    </div>
                `;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                renderDashboard(container);
            }
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="dashboard">
                    <div class="dash-header">
                        <span>The Gold Standard for Community Baseball</span>
                        <h1>Diamond Command Center</h1>
                    </div>
                    <div class="dash-grid">
                        <div class="dash-card" onclick="toggleSection('10. Parent Empowerment')">
                            <span class="icon">🏘️</span>
                            <h3>The Parent Shield</h3>
                            <p>Safety, accountability, and behavioral standards for the entire league culture.</p>
                        </div>
                        <div class="dash-card" onclick="toggleSection('3. Infield Drills')">
                            <span class="icon">🧢</span>
                            <h3>The Coaching Lab</h3>
                            <p>Veteran-grade drill library and practice planning for all age divisions.</p>
                        </div>
                        <div class="dash-card" onclick="toggleSection('1. Core Clinic')">
                            <span class="icon">🛡️</span>
                            <h3>The Umpire Office</h3>
                            <p>Elite clinic modules for training youth and adult volunteer officials.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function copyToClipboard() {
            const body = document.getElementById('md-body').innerText;
            navigator.clipboard.writeText(body).then(() => { alert('Drill instructions copied to clipboard!'); });
        }

        function goHome() { activeKey = ''; renderTree(); updateContent(); }
        init();
    </script>
</body>
</html>
